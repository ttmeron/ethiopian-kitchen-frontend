<div class="admin-container">
  <h1>Food Management</h1>

  <form [formGroup]="foodForm" (ngSubmit)="submitFood()" class="food-form">
    <!-- Food Name Field -->
    <mat-form-field appearance="fill" class="no-underline">
      <mat-label>Food Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter food name" />
    </mat-form-field>

    <!-- Description Field -->
    <mat-form-field appearance="fill" class="no-underline">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" placeholder="Enter description"></textarea>
    </mat-form-field>

    <!-- Price Field -->
    <mat-form-field appearance="fill" class="no-underline">
      <mat-label>Price</mat-label>
      <input matInput type="number" formControlName="price" min="0" step="0.01" />
    </mat-form-field>

    <!-- Category Field -->
    <mat-form-field appearance="fill" class="no-underline">
      <mat-label>Category</mat-label>
      <input matInput formControlName="category" placeholder="e.g. Vegan, Combo, Meat Lover" />
    </mat-form-field>

    <!-- Ingredients Section (FormArray) -->
    <div formArrayName="ingredients" class="ingredient-section">
      <h3>Ingredients</h3>
      
      <div *ngFor="let ingCtrl of ingredientsArray.controls; let i = index" 
           [formGroupName]="i" 
           class="ingredient-row">
        
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Select Ingredient</mat-label>
          <mat-select formControlName="id" 
                      (selectionChange)="onIngredientDropdownChange($event.value, i)">
            <mat-option *ngFor="let ing of ingredients" [value]="ing.id">
              {{ ing.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-icon-button color="warn" type="button" 
                (click)="removeIngredientField(i)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>

      <button mat-raised-button color="primary" type="button" 
              (click)="addIngredientField()">
        <mat-icon>add</mat-icon> Add Ingredient
      </button>
    </div>

    <!-- File Upload Section -->
    <div class="file-upload-section full-width-section">
      <h4>Food Image</h4>
      
      <div class="file-input-wrapper full-width-wrapper">
        <input type="file" 
               (change)="onFileSelected($event)" 
               accept="image/*" 
               class="file-input full-width-input" 
               #fileInput>
        <div class="file-hint">Supported formats: JPG, PNG, GIF, WEBP (Max 5MB)</div>
      </div>

      <!-- Image Preview (when new image selected) -->
      <div *ngIf="imagePreview" class="image-preview">
        <p><strong>Image Preview:</strong></p>
        <img [src]="imagePreview" alt="Preview" class="preview-image">
        <button mat-icon-button color="warn" 
                class="remove-image-btn" 
                matTooltip="Remove image" 
                (click)="removeSelectedImage()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <!-- Current Image (when editing existing food) -->
      <div *ngIf="isEditingFood && selectedFood && selectedFood.imagePath && !imagePreview" 
           class="current-image">
        <p><strong>Current Image:</strong></p>
        <img [src]="getImageUrl(selectedFood)" alt="Preview" class="food-image-preview">
      </div>

      <!-- No Image Message -->
      <div *ngIf="!selectedFile && !imagePreview && (!isEditingFood || !selectedFood || !selectedFood.imagePath)" 
           class="no-image-message">
        No image selected
      </div>
    </div>

    <!-- Form Buttons -->
    <div class="form-buttons">
      <button mat-raised-button color="accent" type="submit">
        {{ isEditingFood ? 'Update Food' : 'Create Food' }}
      </button>
      <button mat-button type="button" (click)="resetForm()">Cancel</button>
    </div>
  </form>

  <!-- Food List -->
  <div class="food-list">
    <h2>Existing Foods</h2>
    
    <table mat-table [dataSource]="foods" class="mat-elevation-z8 full-width-table">
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let food"> {{ food.name }} </td>
      </ng-container>

      <!-- Price Column -->
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Price </th>
        <td mat-cell *matCellDef="let food"> {{ food.price }} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let food">
          <button mat-icon-button color="primary" (click)="editFood(food)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteFood(food.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Header and Row Definitions -->
      <tr mat-header-row *matHeaderRowDef="['name', 'price', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['name', 'price', 'actions'];"></tr>
    </table>
  </div>
</div>
