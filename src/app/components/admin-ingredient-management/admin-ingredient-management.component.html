<!-- admin-ingredient-management.component.html -->
<div class="container">
  <mat-card>
      <div class="ard-title-wrapper">
        <h2 class="page-title" > Ingredient Managemen </h2>
        </div>
   
    
    <mat-card-content>
      <!-- Form Section -->
      <div class="form-section">
        <h3>{{ isEditing ? 'Edit Ingredient' : 'Add New Ingredient' }}</h3>
        
        <form [formGroup]="ingredientForm" (ngSubmit)="submitIngredient()">
          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Name</mat-label>
              <input matInput formControlName="name">
              <mat-error *ngIf="ingredientForm.get('name')?.invalid">
                {{ getErrorMessage('name') }}
              </mat-error>
            </mat-form-field>
            
            <mat-form-field appearance="outline">
              <mat-label>Extra Cost</mat-label>
              <input matInput type="number" formControlName="extraCost">
              <mat-error *ngIf="ingredientForm.get('extraCost')?.invalid">
                {{ getErrorMessage('extraCost') }}
              </mat-error>
            </mat-form-field>
          </div>
          
          <div class="form-actions">
            <button mat-raised-button color="primary" type="submit">
              {{ isEditing ? 'Update' : 'Create' }}
            </button>
            <button mat-button type="button" (click)="addIngredient()" *ngIf="isEditing">
              Cancel
            </button>
          </div>
        </form>
      </div>
      
      <!-- Table Section -->
      <div class="table-section">
        <h3>Ingredients ({{ ingredients.length }})</h3>
        
        <div *ngIf="ingredients.length === 0">
          <p>No ingredients found</p>
        </div>
        
        <table mat-table [dataSource]="ingredients" *ngIf="ingredients.length > 0">
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let ingredient">{{ ingredient.name }}</td>
          </ng-container>
          
          <!-- Extra Cost Column -->
          <ng-container matColumnDef="extraCost">
            <th mat-header-cell *matHeaderCellDef>Extra Cost</th>
            <td mat-cell *matCellDef="let ingredient">${{ ingredient.extraCost }}</td>
          </ng-container>
          
          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let ingredient">
              <button mat-icon-button (click)="editIngredient(ingredient)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="deleteIngredient(ingredient)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>
          
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
